<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMS Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #0f172a;
    }
    
    .login-container {
      width: 100%;
      max-width: 450px;
    }
    
    .login-box {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      padding: 36px;
      border: 1px solid #e2e8f0;
    }
    
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .brand h1 {
      color: #1d4ed8;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .brand p {
      color: #475569;
      font-size: 14px;
    }
    
    .role-selector {
      display: flex;
      gap: 15px;
      margin-bottom: 28px;
    }
    
    .role-btn {
      flex: 1;
      padding: 14px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 700;
      font-size: 15px;
    }
    
    .role-btn:hover {
      border-color: rgba(59, 130, 246, 0.6);
      color: #1d4ed8;
    }
    
    .role-btn.active {
      background: linear-gradient(135deg, #2563eb 0%, #93c5fd 100%);
      color: #ffffff;
      border-color: rgba(59, 130, 246, 0.8);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-control {
      padding: 12px 15px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    
    .form-control::placeholder {
      color: #94a3b8;
    }
    
    .form-control:focus {
      border-color: rgba(59, 130, 246, 0.8);
      box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.12);
      background: #ffffff;
      color: #0f172a;
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      border: 1px solid rgba(96, 165, 250, 0.32);
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
    }
    
    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    
    .alert {
      border-radius: 12px;
      margin-bottom: 20px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      color: #0f172a;
    }
    
    .demo-credentials {
      background: #f8fafc;
      border-left: 4px solid #2563eb;
      padding: 14px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 13px;
      color: #475569;
    }
    
    .demo-credentials strong {
      color: #1d4ed8;
    }
    
    .loading-spinner {
      display: none;
      text-align: center;
      color: #2563eb;
    }
    
    .loading-spinner.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="brand">
        <h1>SAMS</h1>
        <p>Student Attendance Management System</p>
      </div>

      <div id="alert-container"></div>

      <div class="role-selector">
        <button class="role-btn active" data-role="student">
          <i class="fas fa-user-graduate"></i> Student
        </button>
        <button class="role-btn" data-role="teacher">
          <i class="fas fa-chalkboard-user"></i> Teacher
        </button>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" style="font-weight: 600; margin-bottom: 8px;">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
          <label class="form-label" style="font-weight: 600; margin-bottom: 8px;">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="loading-spinner" id="loading">
          <div class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span class="ms-2">Logging in...</span>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">Login</button>
      </form>

      <div class="demo-credentials">
        <strong>Demo Credentials:</strong><br>
        <strong>Student:</strong> aarav_101 / password123<br>
        <strong>Teacher:</strong> asha_rao / password123
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let selectedRole = 'student';
    const BASE_URL = '/api';

    // Role selection
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedRole = this.dataset.role;
        document.getElementById('username').focus();
      });
    });

    // Login form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loading = document.getElementById('loading');
      const submitBtn = document.getElementById('submit-btn');

      loading.classList.add('active');
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${BASE_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            username,
            password,
            role: selectedRole
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Store token and role
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Redirect to appropriate dashboard
          if (data.role === 'teacher') {
            window.location.href = '/teacher-dashboard.html';
          } else {
            window.location.href = '/student-dashboard.html';
          }
        } else {
          showAlert(data.message || 'Login failed', 'danger');
        }
      } catch (error) {
        showAlert('An error occurred. Please try again.', 'danger');
        console.error('Login error:', error);
      } finally {
        loading.classList.remove('active');
        submitBtn.disabled = false;
      }
    });

    function showAlert(message, type = 'info') {
      const alertContainer = document.getElementById('alert-container');
      const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      alertContainer.innerHTML = alertHtml;
    }
  </script>
</body>
</html>
